{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Interview — NexaHire</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #080c14;
      --surface:  #0d1422;
      --glass:    rgba(255,255,255,0.04);
      --border:   rgba(99,179,237,0.18);
      --accent:   #38bdf8;
      --accent2:  #818cf8;
      --danger:   #f87171;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --ai-glow:  rgba(56,189,248,0.35);
      --user-glow:rgba(129,140,248,0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Starfield ── */
    canvas#stars {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    /* ── Header ── */
    header {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 36px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,12,20,0.85);
      backdrop-filter: blur(12px);
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .q-tracker {
      font-size: .8rem; color: var(--muted);
      display: flex; align-items: center; gap: 8px;
    }
    .q-tracker span { color: var(--accent); font-weight: 700; }
    .progress-bar {
      width: 160px; height: 4px;
      background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width .6s ease;
    }

    /* ── Main Layout ── */
    main {
      position: relative; z-index: 5;
      flex: 1;
      display: grid;
      grid-template-columns: 320px 1fr;
      grid-template-rows: 1fr auto;
      gap: 0;
      overflow: hidden;
    }

    /* ── AI Panel ── */
    .ai-panel {
      grid-row: 1 / 3;
      display: flex; flex-direction: column; align-items: center;
      padding: 36px 24px;
      border-right: 1px solid var(--border);
      background: rgba(13,20,34,0.6);
      backdrop-filter: blur(6px);
      gap: 28px;
    }

    /* Character orb */
    .orb-wrapper {
      position: relative;
      width: 180px; height: 180px;
    }
    .orb-ring {
      position: absolute; inset: -12px;
      border-radius: 50%;
      border: 1.5px solid transparent;
      background: linear-gradient(135deg, var(--accent), var(--accent2)) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      animation: spin 8s linear infinite;
    }
    .orb-ring2 {
      position: absolute; inset: -22px;
      border-radius: 50%;
      border: 1px dashed rgba(99,179,237,0.2);
      animation: spin 14s linear infinite reverse;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .orb {
      width: 180px; height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #1e3a5f 0%, #0a1628 60%, #060c18 100%);
      box-shadow: 0 0 60px var(--ai-glow), inset 0 0 40px rgba(56,189,248,0.08);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Face SVG inside orb */
    .ai-face svg { width: 100px; height: 100px; }

    /* Mouth wave bars */
    .mouth-bars {
      display: flex; align-items: flex-end; gap: 3px;
      height: 20px;
    }
    .mouth-bars .bar {
      width: 4px; border-radius: 2px;
      background: var(--accent);
      height: 4px;
      transition: height .1s ease;
    }
    .speaking .bar:nth-child(1) { animation: wave 0.5s 0.0s infinite ease-in-out alternate; }
    .speaking .bar:nth-child(2) { animation: wave 0.5s 0.1s infinite ease-in-out alternate; }
    .speaking .bar:nth-child(3) { animation: wave 0.5s 0.2s infinite ease-in-out alternate; }
    .speaking .bar:nth-child(4) { animation: wave 0.5s 0.1s infinite ease-in-out alternate; }
    .speaking .bar:nth-child(5) { animation: wave 0.5s 0.0s infinite ease-in-out alternate; }
    @keyframes wave { from { height: 4px; } to { height: 18px; } }

    /* Eyes */
    .ai-eyes { display: flex; gap: 20px; margin-bottom: 10px; }
    .eye {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      animation: blink 4s infinite;
    }
    @keyframes blink {
      0%,96%,100% { transform: scaleY(1); }
      98% { transform: scaleY(0.1); }
    }

    .ai-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem; font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .ai-status {
      font-size: .72rem; color: var(--muted);
      display: flex; align-items: center; gap: 6px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
      transition: background .3s, box-shadow .3s;
    }
    .status-dot.listening { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
    .status-dot.speaking  { background: var(--accent);  box-shadow: 0 0 8px var(--accent); }
    .status-dot.idle      { background: #22c55e; box-shadow: 0 0 8px #22c55e; }

    /* Q list mini */
    .q-list {
      width: 100%; flex: 1;
      overflow-y: auto;
    }
    .q-list::-webkit-scrollbar { width: 3px; }
    .q-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    .q-item {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: .72rem;
      color: var(--muted);
      margin-bottom: 6px;
      border-left: 2px solid transparent;
      cursor: pointer;
      transition: all .2s;
      line-height: 1.5;
    }
    .q-item.active {
      background: rgba(56,189,248,0.08);
      border-left-color: var(--accent);
      color: var(--text);
    }
    .q-item.done {
      border-left-color: #22c55e;
      color: var(--muted);
    }
    .q-item .q-num {
      display: inline-block; width: 18px; height: 18px;
      border-radius: 50%; background: rgba(255,255,255,0.06);
      text-align: center; line-height: 18px;
      margin-right: 6px; font-size: .65rem;
    }
    .q-item.active .q-num { background: var(--accent); color: #000; }
    .q-item.done  .q-num { background: #22c55e; color: #000; }

    /* ── Chat Area ── */
    .chat-area {
      display: flex; flex-direction: column;
      padding: 32px 40px 0;
      overflow: hidden;
      gap: 20px;
    }

    .transcript-box {
      flex: 1;
      display: flex; flex-direction: column; justify-content: flex-end;
      gap: 16px;
      overflow: hidden;
    }

    /* ── Message Bubbles ── */
    .bubble-wrap {
      display: flex; align-items: flex-end; gap: 12px;
      animation: bubbleIn .4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(20px) scale(.95); }
      to   { opacity: 1; transform: none; }
    }
    .bubble-wrap.ai-side { justify-content: flex-start; }
    .bubble-wrap.user-side { justify-content: flex-end; flex-direction: row-reverse; }

    .bubble-avatar {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700;
    }
    .ai-avatar {
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      box-shadow: 0 0 14px var(--ai-glow);
      font-family: 'Syne', sans-serif;
    }
    .user-avatar {
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      box-shadow: 0 0 14px var(--user-glow);
    }

    .bubble {
      max-width: 68%;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: .88rem;
      line-height: 1.65;
      position: relative;
    }
    .ai-bubble {
      background: rgba(56,189,248,0.08);
      border: 1px solid rgba(56,189,248,0.2);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }
    .user-bubble {
      background: rgba(129,140,248,0.12);
      border: 1px solid rgba(129,140,248,0.25);
      border-bottom-right-radius: 4px;
      color: var(--text);
    }

    /* Typing cursor for live text */
    .live-text::after {
      content: '▋';
      animation: cursor-blink .7s infinite;
      color: var(--accent);
      margin-left: 2px;
    }
    @keyframes cursor-blink { 50% { opacity: 0; } }

    .bubble-label {
      font-size: .65rem; color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .ai-side .bubble-label { text-align: left; }
    .user-side .bubble-label { text-align: right; }

    /* ── Controls ── */
    .controls-bar {
      padding: 24px 40px 28px;
      display: flex; align-items: center; justify-content: center; gap: 20px;
    }

    .btn-mic {
      width: 72px; height: 72px; border-radius: 50%;
      border: 2px solid var(--accent2);
      background: rgba(129,140,248,0.08);
      color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      transition: all .2s;
      position: relative;
    }
    .btn-mic:hover { background: rgba(129,140,248,0.18); transform: scale(1.05); }
    .btn-mic.recording {
      border-color: var(--danger);
      background: rgba(248,113,113,0.15);
      animation: pulse-mic 1.2s infinite;
    }
    @keyframes pulse-mic {
      0%,100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.4); }
      50%      { box-shadow: 0 0 0 14px rgba(248,113,113,0); }
    }

    .btn-next {
      padding: 14px 28px; border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--glass);
      color: var(--text); cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: .82rem;
      transition: all .2s;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-next:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(56,189,248,0.06);
    }
    .btn-next:disabled { opacity: .3; cursor: not-allowed; }

    .btn-end {
      padding: 14px 24px; border-radius: 12px;
      border: 1px solid rgba(248,113,113,0.3);
      background: rgba(248,113,113,0.06);
      color: var(--danger); cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: .82rem;
      transition: all .2s;
    }
    .btn-end:hover { background: rgba(248,113,113,0.14); }

    .mic-hint {
      font-size: .72rem; color: var(--muted);
      text-align: center;
    }

    /* ── Waveform visualizer ── */
    .waveform {
      display: flex; align-items: center; gap: 3px; height: 32px;
    }
    .waveform .wbar {
      width: 3px; border-radius: 99px;
      background: var(--accent2); height: 4px;
    }
    .waveform.active .wbar:nth-child(odd)  { animation: wv .5s infinite alternate ease-in-out; }
    .waveform.active .wbar:nth-child(even) { animation: wv .5s .25s infinite alternate ease-in-out; }
    @keyframes wv { to { height: 28px; } }

    /* ── Summary Overlay ── */
    #summary-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(8,12,20,0.96);
      backdrop-filter: blur(16px);
      align-items: center; justify-content: center;
    }
    #summary-overlay.show { display: flex; }
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      max-width: 640px; width: 90%;
      animation: bubbleIn .5s cubic-bezier(.34,1.56,.64,1);
    }
    .summary-card h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem; color: var(--accent);
      margin-bottom: 8px;
    }
    .summary-card p { color: var(--muted); margin-bottom: 20px; font-size: .85rem; }
    .qa-item { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .qa-item:last-child { border-bottom: none; }
    .qa-q { font-size: .78rem; color: var(--accent); margin-bottom: 5px; font-weight: 600; }
    .qa-a { font-size: .82rem; color: var(--text); line-height: 1.6; }
    .btn-finish {
      margin-top: 20px; padding: 14px 32px; border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000; font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: .9rem; cursor: pointer;
      transition: opacity .2s;
    }
    .btn-finish:hover { opacity: .88; }
    .summary-scroll { max-height: 380px; overflow-y: auto; padding-right: 8px; }
    .summary-scroll::-webkit-scrollbar { width: 3px; }
    .summary-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: rgba(13,20,34,0.95); border: 1px solid var(--border);
      padding: 12px 24px; border-radius: 10px;
      font-size: .8rem; color: var(--text);
      z-index: 200;
      opacity: 0; transition: opacity .3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<!-- Header -->
<header>
  <div class="logo">NexaHire</div>
  <div class="q-tracker">
    <span id="q-current">1</span> / <span id="q-total">12</span>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:8%"></div></div>
  </div>
  <div style="font-size:.72rem;color:var(--muted)">AI Interview Session</div>
</header>

<main>
  <!-- AI Sidebar -->
  <aside class="ai-panel">
    <div class="orb-wrapper">
      <div class="orb-ring"></div>
      <div class="orb-ring2"></div>
      <div class="orb" id="orb">
        <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
          <div class="ai-eyes">
            <div class="eye"></div>
            <div class="eye" style="animation-delay:-.5s"></div>
          </div>
          <div class="mouth-bars" id="mouth-bars">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="ai-name">NEXUS AI</div>
    <div class="ai-status">
      <div class="status-dot idle" id="status-dot"></div>
      <span id="status-text">Ready</span>
    </div>

    <!-- Question list -->
    <div class="q-list" id="q-list"></div>
  </aside>

  <!-- Chat -->
  <div class="chat-area">
    <div class="transcript-box" id="transcript-box">
      <!-- bubbles appear here -->
    </div>
  </div>

  <!-- Controls -->
  <div class="controls-bar">
    <div style="text-align:center">
      <div class="waveform" id="waveform" style="justify-content:center;margin-bottom:8px;">
        <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
        <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
        <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
      </div>
      <button class="btn-mic" id="btn-mic" title="Hold to speak">🎤</button>
      <div class="mic-hint" id="mic-hint">Click to answer</div>
    </div>
    <button class="btn-next" id="btn-next" disabled>Next Question →</button>
    <button class="btn-end" id="btn-end">End Session</button>
  </div>
</main>

<!-- Summary Overlay -->
<div id="summary-overlay">
  <div class="summary-card">
    <h2>🎉 Interview Complete</h2>
    <p>Here is a summary of your responses for this session.</p>
    <div class="summary-scroll" id="summary-body"></div>
    <button class="btn-finish" onclick="window.location='/'">Return Home</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Stars ──────────────────────────────────────────────
(function(){
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  c.width  = window.innerWidth;
  c.height = window.innerHeight;
  const stars = Array.from({length:140},()=>({
    x: Math.random()*c.width, y: Math.random()*c.height,
    r: Math.random()*1.2+.2,
    o: Math.random()*.6+.1,
    s: Math.random()*.003+.001
  }));
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.o += s.s; if(s.o>0.7||s.o<0.1) s.s=-s.s;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(148,200,255,${s.o})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── Parse questions from Django template ──────────────
const rawQuestions = `{{ session.questions | escapejs }}`;
const allQuestions = parseQuestions(rawQuestions);

function parseQuestions(text){
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  const qs = [];
  lines.forEach(line=>{
    const m = line.match(/^\d+[\.\)]\s*(.+)/);
    if(m) qs.push(m[1].replace(/\*\*/g,'').trim());
    else if(line.startsWith('**') && line.endsWith('**'))
      qs.push(line.replace(/\*\*/g,'').trim());
  });
  return qs.length ? qs : lines.filter(l=>l.length>20).slice(0,12);
}

// ── State ─────────────────────────────────────────────
let currentQ   = 0;
let isListening= false;
let isSpeaking = false;
let recognition= null;
let liveAnswer = '';
let sessionLog = []; // {q, a}
let userBubble = null;
let aiBubble   = null;

const totalQ = allQuestions.length;
document.getElementById('q-total').textContent = totalQ;

// ── Build sidebar Q list ───────────────────────────────
function buildQList(){
  const el = document.getElementById('q-list');
  el.innerHTML = '';
  allQuestions.forEach((q,i)=>{
    const d = document.createElement('div');
    d.className = 'q-item' + (i===currentQ?' active':'') + (i<currentQ?' done':'');
    d.id = `qi-${i}`;
    d.innerHTML = `<span class="q-num">${i+1}</span>${q.slice(0,55)}${q.length>55?'…':''}`;
    el.appendChild(d);
  });
}
buildQList();

// ── Speech Synthesis ──────────────────────────────────
function speak(text, onDone){
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang  = 'en-US';
  utter.rate  = 0.95;
  utter.pitch = 1.05;

  const voices = speechSynthesis.getVoices();
  const pref   = voices.find(v=>v.name.includes('Google')&&v.lang==='en-US')
               || voices.find(v=>v.lang==='en-US');
  if(pref) utter.voice = pref;

  utter.onstart = ()=>{ isSpeaking=true;  setStatus('speaking'); animateMouth(true); };
  utter.onend   = ()=>{ isSpeaking=false; setStatus('idle');     animateMouth(false); if(onDone) onDone(); };
  speechSynthesis.speak(utter);
}

function animateMouth(on){
  document.getElementById('mouth-bars').classList.toggle('speaking', on);
}

// ── Status helper ─────────────────────────────────────
function setStatus(s){
  const dot  = document.getElementById('status-dot');
  const txt  = document.getElementById('status-text');
  dot.className = `status-dot ${s}`;
  txt.textContent = s === 'speaking' ? 'Speaking…' : s === 'listening' ? 'Listening…' : 'Ready';
}

// ── Show a bubble ─────────────────────────────────────
function addBubble(who, text, live){
  const box  = document.getElementById('transcript-box');
  const wrap = document.createElement('div');
  wrap.className = `bubble-wrap ${who==='ai'?'ai-side':'user-side'}`;
  const avatarHTML = who==='ai'
    ? `<div class="bubble-avatar ai-avatar">AI</div>`
    : `<div class="bubble-avatar user-avatar">ME</div>`;
  const inner = document.createElement('div');
  inner.innerHTML = `
    <div class="bubble-label">${who==='ai'?'NEXUS AI':'YOU'}</div>
    <div class="bubble ${who==='ai'?'ai-bubble':'user-bubble'} ${live?'live-text':''}" id="${who}-live-bubble">${text}</div>`;
  if(who==='ai'){ wrap.appendChild(document.createElement('div')); wrap.children[0].outerHTML; wrap.innerHTML = avatarHTML + inner.outerHTML; }
  else { wrap.innerHTML = avatarHTML + inner.outerHTML; wrap.insertBefore(wrap.children[1],wrap.children[0]); }
  wrap.innerHTML = who==='ai'
    ? avatarHTML + `<div><div class="bubble-label">NEXUS AI</div><div class="bubble ai-bubble ${live?'live-text':''}" id="ai-live-bubble">${text}</div></div>`
    : `<div><div class="bubble-label" style="text-align:right">YOU</div><div class="bubble user-bubble ${live?'live-text':''}" id="user-live-bubble">${text}</div></div>` + avatarHTML;
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
  return wrap;
}

function updateLiveBubble(who, text){
  const el = document.getElementById(`${who}-live-bubble`);
  if(el) el.textContent = text;
}

function removeLiveCursor(who){
  const el = document.getElementById(`${who}-live-bubble`);
  if(el) el.classList.remove('live-text');
}

// ── Ask a question ────────────────────────────────────
function askQuestion(idx){
  if(idx >= allQuestions.length){ endSession(); return; }
  currentQ = idx;
  const q  = allQuestions[idx];

  document.getElementById('q-current').textContent = idx+1;
  document.getElementById('progress-fill').style.width = `${((idx+1)/totalQ)*100}%`;
  buildQList();
  document.getElementById('btn-next').disabled = true;

  // Show AI bubble with live typewriter
  aiBubble = addBubble('ai', '', true);
  let i=0, displayed='';
  const typeInt = setInterval(()=>{
    if(i<q.length){ displayed+=q[i++]; updateLiveBubble('ai',displayed); }
    else { clearInterval(typeInt); removeLiveCursor('ai'); }
  }, 28);

  // Speak it
  speak(q, ()=>{
    // After AI finishes speaking, allow user to answer
    document.getElementById('btn-mic').disabled = false;
    document.getElementById('mic-hint').textContent = 'Click mic to answer';
    setStatus('idle');
  });
}

// ── Speech Recognition ────────────────────────────────
function initRecognition(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){ showToast('Speech recognition not supported. Use Chrome.'); return null; }
  const r = new SpeechRecognition();
  r.lang        = 'en-US';
  r.interimResults = true;
  r.continuous  = false;

  r.onstart  = ()=>{ isListening=true; setStatus('listening'); document.getElementById('waveform').classList.add('active'); };
  r.onend    = ()=>{ isListening=false; setStatus('idle'); document.getElementById('waveform').classList.remove('active'); stopMic(); };

  r.onresult = (e)=>{
    let interim='', final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    const current = (liveAnswer + ' ' + (final || interim)).trim();
    updateLiveBubble('user', current);
    if(final){ liveAnswer = (liveAnswer+' '+final).trim(); }
  };

  r.onerror = (e)=>{ showToast('Mic error: '+e.error); stopMic(); };
  return r;
}

function startMic(){
  if(isSpeaking){ showToast('Please wait for AI to finish.'); return; }
  liveAnswer = '';
  userBubble = addBubble('user','…',true);
  recognition = initRecognition();
  if(!recognition) return;

  document.getElementById('btn-mic').classList.add('recording');
  document.getElementById('btn-mic').textContent = '⏹';
  document.getElementById('mic-hint').textContent = 'Recording… click to stop';
  recognition.start();
}

function stopMic(){
  if(recognition){ try{ recognition.stop(); }catch(e){} }
  document.getElementById('btn-mic').classList.remove('recording');
  document.getElementById('btn-mic').textContent = '🎤';
  document.getElementById('mic-hint').textContent = 'Click to answer';
  removeLiveCursor('user');
  if(liveAnswer.trim()){
    sessionLog.push({ q: allQuestions[currentQ], a: liveAnswer.trim() });
    document.getElementById('btn-next').disabled = false;
    document.getElementById('btn-mic').disabled = true;
  } else {
    // Remove empty user bubble
    const box = document.getElementById('transcript-box');
    if(userBubble) box.removeChild(userBubble);
    showToast('No answer detected. Try again.');
  }
}

document.getElementById('btn-mic').addEventListener('click',()=>{
  isListening ? stopMic() : startMic();
});

// ── Next question ─────────────────────────────────────
document.getElementById('btn-next').addEventListener('click',()=>{
  // Clear chat area
  const box = document.getElementById('transcript-box');
  box.innerHTML = '';
  userBubble = null; aiBubble = null;

  // Advance
  askQuestion(currentQ+1);
  document.getElementById('btn-mic').disabled = false;
});

// ── End Session ───────────────────────────────────────
document.getElementById('btn-end').addEventListener('click', endSession);
function endSession(){
  speechSynthesis.cancel();
  if(recognition) try{ recognition.stop(); }catch(e){}

  // Build summary
  const body = document.getElementById('summary-body');
  body.innerHTML = '';
  sessionLog.forEach((item,i)=>{
    body.innerHTML += `
      <div class="qa-item">
        <div class="qa-q">Q${i+1}. ${item.q}</div>
        <div class="qa-a">${item.a || '<em style="color:var(--muted)">No answer recorded</em>'}</div>
      </div>`;
  });
  if(!sessionLog.length) body.innerHTML = '<p style="color:var(--muted)">No answers recorded in this session.</p>';
  document.getElementById('summary-overlay').classList.add('show');
}

// ── Toast ─────────────────────────────────────────────
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

// ── Init ──────────────────────────────────────────────
window.addEventListener('load',()=>{
  if(speechSynthesis.onvoiceschanged !== undefined){
    speechSynthesis.onvoiceschanged = ()=>{};
  }
  // Brief greeting then first question
  setTimeout(()=>{
    const intro = `Hello! I'm Nexus, your AI interviewer today. I've reviewed your resume and prepared ${totalQ} questions. Let's begin!`;
    addBubble('ai', intro, false);
    speak(intro, ()=> setTimeout(()=> askQuestion(0), 600));
  }, 800);
});
</script>
