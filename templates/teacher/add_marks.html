{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Student Result</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #c7d2fe, #e0f2fe);
        }

        .container {
            width: 500px;
            margin: 40px auto;
            background: white;
            padding: 25px 35px 25px 25px;
            border-radius: 12px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.15);
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 12px;
            color: #374151;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            border-color: #2563eb;
        }

        .row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .row div {
            width: 50%;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1e40af;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 10px;
        }

        .success {
            color: green;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Add Student Result</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    {% if success %}
        <p class="success">{{ success }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label for="student">Select Student</label>
        <select name="student" id="student" required>
            <option value="">-- Select Student --</option>
            {% for s in students %}
                <option value="{{ s.id }}">
                    {{ s.full_name }} ({{ s.roll_no }})
                </option>
            {% endfor %}
        </select>

        <div class="row">
            <div>
                <label for="subject1">Subject 1</label>
                <input type="text" name="subject1" id="subject1" required>
            </div>
            <div>
                <label for="marks1">Marks</label>
                <input type="number" name="marks1" id="marks1" min="0" max="100" required>
            </div>
        </div>

        <div class="row">
            <div>
                <label for="subject2">Subject 2</label>
                <input type="text" name="subject2" id="subject2" required>
            </div>
            <div>
                <label for="marks2">Marks</label>
                <input type="number" name="marks2" id="marks2" min="0" max="100" required>
            </div>
        </div>

        <div class="row">
            <div>
                <label for="subject3">Subject 3</label>
                <input type="text" name="subject3" id="subject3" required>
            </div>
            <div>
                <label for="marks3">Marks</label>
                <input type="number" name="marks3" id="marks3" min="0" max="100" required>
            </div>
        </div>

        <div class="row">
            <div>
                <label for="subject4">Subject 4</label>
                <input type="text" name="subject4" id="subject4" required>
            </div>
            <div>
                <label for="marks4">Marks</label>
                <input type="number" name="marks4" id="marks4" min="0" max="100" required>
            </div>
        </div>

        <div class="row">
            <div>
                <label for="subject5">Subject 5</label>
                <input type="text" name="subject5" id="subject5" required>
            </div>
            <div>
                <label for="marks5">Marks</label>
                <input type="number" name="marks5" id="marks5" min="0" max="100" required>
            </div>
        </div>

        <button type="submit">Save Result</button>
    </form>
</div>

</body>
</html>
